<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Smart v22.1 Fixed Touch</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; touch-action: none; }
        #status-area { height: 12vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; }
        #call-display { font-size: 8vw; color: #f44; font-weight: bold; text-align: center; width: 100%; }
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #settings-overlay { display: none; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(20,20,20,0.95); border-top: 2px solid #007bff; z-index: 100; flex-direction: column; touch-action: auto; }
        .tabs { display: flex; background: #333; }
        .tab-btn { flex: 1; padding: 12px; border: none; color: #ccc; background: none; font-weight: bold; font-size: 14px; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-content { padding: 15px; max-height: 50vh; overflow-y: auto; display: none; }
        .tab-content.active { display: flex; flex-direction: column; gap: 10px; }
        
        .s-label { display: flex; justify-content: space-between; font-size: 13px; color: #0f0; font-weight: bold; }
        input[type=range] { width: 100%; height: 40px; cursor: pointer; touch-action: auto; }
        .btn-row { display: flex; gap: 8px; padding: 10px; background: #1a1a1a; flex-shrink: 0; }
        button { border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; touch-action: auto; }
        .btn-main { background: #28a745; flex: 2; padding: 15px; font-size: 18px; }
        .btn-gear { background: #007bff; flex: 0.8; font-size: 20px; }
        .btn-pip { background: #6f42c1; flex: 1; font-size: 14px; }
        .btn-done { background: #007bff; padding: 15px; margin: 10px; font-size: 16px; }
        #drag-hint { position: absolute; top: 10px; width: 100%; text-align: center; color: #007bff; font-weight: bold; pointer-events: none; display: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="status-area"><div id="call-display">ГОТОВИЙ</div></div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
        <div id="drag-hint">ТЯГНІТЬ ТУТ ДЛЯ ПЕРЕМІЩЕННЯ</div>

        <div id="settings-overlay">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'tab-points')">ТОЧКИ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-sys')">СИСТЕМА</button>
            </div>
            <div id="tab-points" class="tab-content active">
                <div class="s-label"><span>РОЗМІР: <span id="v-size">20</span></span></div>
                <input type="range" id="sizeRange" min="5" max="80" value="20" oninput="saveUpd()">
                <div class="s-label"><span>ВІДСТАНЬ: <span id="v-gap">9.0</span></span></div>
                <input type="range" id="gapRange" min="1" max="15" value="9.0" step="0.1" oninput="saveUpd()">
                <button class="btn-done" onclick="tglS()">ГОТОВО ✓</button>
            </div>
            <div id="tab-sys" class="tab-content">
                <div class="s-label"><span>FPS: <span id="v-fps">1</span> | ПОРІГ: <span id="v-sens">40</span></span></div>
                <input type="range" id="fpsRange" min="1" max="30" value="1" oninput="saveUpd()">
                <input type="range" id="sensRange" min="10" max="100" value="40" oninput="saveUpd()">
                <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:4px;">
                    <script>for(let i=1; i<=10; i++) document.write(`<button style="background:#444; padding:8px 0; border-radius:6px; color:white;" onclick="reg(${i}, false)">${i}</button>`);</script>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn-gear" onclick="tglS()">⚙️</button>
        <button class="btn-pip" onclick="togglePiP()">🖼️ ПОВЕРХ</button>
        <button id="start-btn" class="btn-main" onclick="tglA()">▶ СТАРТ</button>
        <button style="background:#444; flex:1;" onclick="res()">СКИДАННЯ</button>
    </div>

    <canvas id="pipCanvas" width="750" height="200" style="display:none;"></canvas>
    <video id="pipVideo" autoplay muted style="display:none;"></video>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';
        let act = false, calls = [], isSettings = false;
        let groupPos = { x: 10, y: 50, gap: 9.0, size: 20 };
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, baseline: 0, lastVal: 0, detectStart: 0, lastSeenTime: 0 }));

        const vid = document.getElementById('video'), disp = document.getElementById('call-display');
        const ov = document.getElementById('overlay'), pCanv = document.getElementById('pipCanvas'), pCtx = pCanv.getContext('2d'), pVid = document.getElementById('pipVideo');
        const canv = document.createElement('canvas'), ctx = canv.getContext('2d', { willReadFrequently: true });
        const camBox = document.getElementById('cam-box'), hint = document.getElementById('drag-hint');

        // Події дотиків тільки для зони відео
        camBox.addEventListener('touchstart', (e) => {
            if (e.target === camBox || e.target === ov || e.target === hint) handleTouch(e);
        });
        camBox.addEventListener('touchmove', (e) => {
            if (e.target === camBox || e.target === ov || e.target === hint) handleTouch(e);
        });

        function handleTouch(e) {
            if (!isSettings || document.getElementById('tab-points').style.display === 'none') return;
            const touch = e.touches[0];
            const rect = camBox.getBoundingClientRect();
            groupPos.x = ((touch.clientX - rect.left) / rect.width) * 100;
            groupPos.y = ((touch.clientY - rect.top) / rect.height) * 100;
            saveUpd(false); 
            e.preventDefault();
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).style.display = "flex";
            evt.currentTarget.classList.add("active");
            document.getElementById('status-area').style.display = (tabName === 'tab-points') ? 'none' : 'flex';
            hint.style.display = (tabName === 'tab-points') ? 'block' : 'none';
        }

        function tglS() {
            const s = document.getElementById('settings-overlay');
            isSettings = (s.style.display !== 'flex');
            s.style.display = isSettings ? 'flex' : 'none';
            document.getElementById('status-area').style.display = 'flex';
            hint.style.display = 'none';
            if(isSettings) openTab({currentTarget: document.querySelector('.tab-btn')}, 'tab-points');
        }

        function upd() {
            groupPos.gap = parseFloat(document.getElementById('gapRange').value);
            groupPos.size = document.getElementById('sizeRange').value;
            document.getElementById('v-size').innerText = groupPos.size;
            document.getElementById('v-gap').innerText = groupPos.gap.toFixed(1);
            document.getElementById('v-fps').innerText = document.getElementById('fpsRange').value;
            document.getElementById('v-sens').innerText = document.getElementById('sensRange').value;
            ov.innerHTML = '';
            zones.forEach((z, i) => {
                z.curX = groupPos.x + (i * groupPos.gap);
                z.curY = groupPos.y;
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.curX + "%"); c.setAttribute("cy", z.curY + "%");
                c.setAttribute("r", groupPos.size); c.setAttribute("fill", "rgba(0,255,0,0.25)");
                c.setAttribute("stroke", "white"); ov.appendChild(c);
            });
        }

        function reg(id, isCam = true) {
            const now = Date.now();
            const z = zones[id-1];
            if (isCam && (!act || now - z.lastSeenTime < 20000)) { if(isCam) z.lastSeenTime = now; return; }
            z.lastSeenTime = now;
            let idx = calls.findIndex(x => x.id === id);
            if (idx !== -1) calls.splice(idx, 1);
            calls.push({ id, time: now });
            if (calls.length > 5) calls.shift();
            let tgText = calls.map(x => `${x.id}(${Math.floor((Date.now() - x.time) / 60000)})`).join(", ");
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(tgText)}`);
            render();
        }

        function render() {
            const now = Date.now();
            let txt = calls.length === 0 ? (act ? "ГОТОВИЙ" : "ПАУЗА") : calls.map(x => `${x.id}(${Math.floor((now - x.time) / 60000)})`).join(", ");
            disp.innerText = txt; disp.style.color = calls.length === 0 ? "#0f0" : "#f44";
            pCtx.fillStyle = "black"; pCtx.fillRect(0, 0, pCanv.width, pCanv.height);
            pCtx.fillStyle = "#ff4444"; pCtx.font = "bold 55px sans-serif"; pCtx.textAlign = "center";
            pCtx.fillText(txt, pCanv.width/2, pCanv.height/2 + 20);
        }

        function tglA() { 
            act = !act; document.getElementById('start-btn').innerText = act ? "🛑 СТОП" : "▶ СТАРТ";
            if (act) { setTimeout(() => { zones.forEach(z => z.baseline = z.lastVal); }, 1200); } 
            render(); 
        }

        function loop() {
            if (vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.drawImage(vid, 0, 0);
                const now = Date.now(), sens = parseInt(document.getElementById('sensRange').value);
                zones.forEach((z) => {
                    const x = Math.floor(canv.width * z.curX / 100), y = Math.floor(canv.height * z.curY / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    const bright = (p[0] * 0.299 + p[1] * 0.587 + p[2] * 0.114);
                    z.lastVal = Math.floor(bright);
                    if (act && bright > (z.baseline + sens)) {
                        if (z.detectStart === 0) z.detectStart = now; 
                        if (now - z.detectStart > 300) { reg(z.id, true); z.on = true; }
                    } else { z.detectStart = 0; z.on = false; }
                });
            }
            setTimeout(loop, 1000 / parseInt(document.getElementById('fpsRange').value));
        }

        async function init() {
            try {
                vid.srcObject = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, facingMode: "environment" } });
                const p = JSON.parse(localStorage.getItem('vP221') || '{}');
                if(p.x) groupPos.x = p.x; if(p.y) groupPos.y = p.y;
                if(p.s) document.getElementById('sizeRange').value = p.s;
                if(p.g) document.getElementById('gapRange').value = p.g;
                if(p.f) document.getElementById('fpsRange').value = p.f;
                if(p.sn) document.getElementById('sensRange').value = p.sn;
                upd(); loop();
            } catch (e) { upd(); loop(); }
        }

        function saveUpd(writeStorage = true) { 
            if(writeStorage) localStorage.setItem('vP221', JSON.stringify({x: groupPos.x, y: groupPos.y, s: document.getElementById('sizeRange').value, g: document.getElementById('gapRange').value, f: document.getElementById('fpsRange').value, sn: document.getElementById('sensRange').value})); 
            upd(); 
        }
        function res() { calls = []; render(); zones.forEach(z => z.lastSeenTime = 0); }
        async function togglePiP() { const stream = pCanv.captureStream(10); pVid.srcObject = stream; await pVid.play(); await pVid.requestPictureInPicture(); }
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') res(); });
        init();
    </script>
</body>
</html>
