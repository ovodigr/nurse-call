<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Контроль Палат</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Секція відео */
        #videoContainer {
            width: 100%;
            height: 40vh; /* Стандартна висота */
            background: #000;
            display: flex;
            justify-content: center;
            position: relative;
            transition: height 0.3s ease;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Вкладки */
        .tabs { display: flex; background: #1f1f1f; border-bottom: 1px solid #333; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: none;
            color: #888; font-weight: bold; cursor: pointer;
        }
        .tab-btn.active { color: #00d1ff; border-bottom: 3px solid #00d1ff; }

        /* Контент вкладок */
        .tab-content { display: none; padding: 15px; height: calc(60vh - 50px); overflow-y: auto; }
        .tab-content.active { display: block; }

        /* Слайдери */
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        input[type="range"] { width: 100%; height: 30px; }

        /* Список палат (ховається в режимі Позиція) */
        #statusList { background: #1a1a1a; border-radius: 8px; padding: 10px; }
        .room-item { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        .test-btn {
            width: 100%; padding: 15px; background: #007bff; border: none;
            color: white; border-radius: 5px; margin-top: 10px; font-weight: bold;
        }

        /* Спеціальний клас для великої камери */
        .expanded-video #videoContainer { height: 75vh; }
        .expanded-video .tabs, .expanded-video #statusList { display: none; }
    </style>
</head>
<body>

<div id="videoContainer">
    <canvas id="cameraCanvas"></canvas>
</div>

<div class="tabs" id="tabsMenu">
    <button class="tab-btn active" onclick="switchTab('position')">ПОЗИЦІЯ</button>
    <button class="tab-btn" onclick="switchTab('settings')">ПАРАМЕТРИ/ТЕСТ</button>
</div>

<div id="tab-position" class="tab-content active">
    <div class="control-group">
        <label>РОЗМІР ТОЧОК: <span id="valSize">10</span></label>
        <input type="range" id="dotSize" min="5" max="40" value="10">
    </div>
    <div class="control-group">
        <label>ВІДСТАНЬ МІЖ ТОЧКАМИ: <span id="valDist">30</span></label>
        <input type="range" id="dotDist" min="10" max="150" value="30">
    </div>
    <button class="test-btn" style="background: #28a745;" onclick="saveAndExit()">ЗБЕРЕГТИ ПОЗИЦІЮ</button>
</div>

<div id="tab-settings" class="tab-content">
    <div class="control-group">
        <label>ПОРІГ ЯСКРАВОСТІ (DELTA): <span id="valDelta">40</span></label>
        <input type="range" id="delta" min="1" max="100" value="40">
    </div>
    
    <button class="test-btn" onclick="alert('Тест Telegram відправлено!')">ТЕСТ TELEGRAM</button>

    <h3>Статус палат:</h3>
    <div id="statusList">
        <div class="room-item"><span>Палата 1</span><span style="color: #28a745;">OK</span></div>
        <div class="room-item"><span>Палата 2</span><span style="color: #ffc107;">ВИКЛИК</span></div>
        <div class="room-item"><span>Палата 3</span><span style="color: #28a745;">OK</span></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('cameraCanvas');
    const ctx = canvas.getContext('2d');
    
    // Імітація розмірів камери
    canvas.width = 640;
    canvas.height = 480;

    function draw() {
        // Очистка та фон (імітація камери)
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const size = parseInt(document.getElementById('dotSize').value);
        const dist = parseInt(document.getElementById('dotDist').value);
        
        document.getElementById('valSize').innerText = size;
        document.getElementById('valDist').innerText = dist;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Малюємо 5 точок для прикладу
        for (let i = 0; i < 5; i++) {
            let rawX = centerX + (i - 2) * dist;
            let rawY = centerY;

            // CLAMP: Обмеження, щоб кружечок не виходив за межі
            let x = Math.max(size, Math.min(rawX, canvas.width - size));
            let y = Math.max(size, Math.min(rawY, canvas.height - size));

            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = "white";
            ctx.font = "10px Arial";
            ctx.fillText(i+1, x-3, y+4);
        }
        requestAnimationFrame(draw);
    }

    function switchTab(mode) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if (mode === 'position') {
            document.body.classList.add('expanded-video');
            document.getElementById('tab-position').classList.add('active');
            event.target.classList.add('active');
        } else {
            document.body.classList.remove('expanded-video');
            document.getElementById('tab-settings').classList.add('active');
            event.target.classList.add('active');
        }
    }

    function saveAndExit() {
        alert("Позиції збережено!");
        switchTab('settings');
        // Тут логіка відправки координат на ваш Python сервер
    }

    draw();
</script>
</body>
</html>
