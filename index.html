<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Smart Monitor v18.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #status-area { height: 15vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; }
        #call-display { font-size: 8vw; color: #f44; font-weight: bold; text-align: center; width: 100%; }
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; flex-shrink: 0; max-height: 50vh; overflow-y: auto; }
        #settings-group { display: none; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .s-label { display: flex; justify-content: space-between; font-size: 14px; color: #0f0; font-weight: bold; }
        input[type=range] { width: 100%; height: 40px; margin: 0; cursor: pointer; } 
        .test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        .t-btn { background: #333; border: 1px solid #555; border-radius: 8px; padding: 12px 0; color: white; font-weight: bold; font-size: 16px; }
        .btn-row { display: flex; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 3; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; flex: 2; }
        .btn-gear { background: #007bff; flex: 1; font-size: 24px; }
    </style>
</head>
<body>

    <div id="status-area"><div id="call-display">ГОТОВИЙ</div></div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-group">
            <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">20</span></div>
            <input type="range" id="sizeRange" min="5" max="120" value="20" oninput="saveAndUpd()">
            
            <div class="s-label"><span>ВІДСТАНЬ (КРОК)</span><span id="v-gap">9.0</span></div>
            <input type="range" id="gapRange" min="2" max="18" value="9.0" step="0.1" oninput="saveAndUpd()">
            
            <div class="s-label"><span>ЦИФРОВА ЯСКРАВІСТЬ</span><span id="v-exp">1.0</span></div>
            <input type="range" id="expRange" min="0.1" max="2.0" value="1.0" step="0.05" oninput="saveAndUpd()">
            
            <div class="test-grid">
                <script>for(let i=1; i<=10; i++) document.write(`<button class="t-btn" onclick="reg(${i})">${i}</button>`);</script>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="tglS()">⚙️</button>
            <button id="start-btn" class="btn-start" onclick="tglA()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="res()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';

        let active = false, calls = [];
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, on: false }));

        const vid = document.getElementById('video'), disp = document.getElementById('call-display');
        const ov = document.getElementById('overlay'), canv = document.createElement('canvas'), ctx = canv.getContext('2d');

        // ЗАВАНТАЖЕННЯ НАЛАШТУВАНЬ
        function loadPrefs() {
            const p = JSON.parse(localStorage.getItem('vellezPrefs') || '{}');
            if(p.size) document.getElementById('sizeRange').value = p.size;
            if(p.gap) document.getElementById('gapRange').value = p.gap;
            if(p.exp) document.getElementById('expRange').value = p.exp;
        }

        function saveAndUpd() {
            localStorage.setItem('vellezPrefs', JSON.stringify({
                size: document.getElementById('sizeRange').value,
                gap: document.getElementById('gapRange').value,
                exp: document.getElementById('expRange').value
            }));
            upd();
        }

        function reg(id, cam = false) {
            if (cam && !active) return;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ВИКЛИК: Палата №' + id)}`);
            let i = calls.findIndex(x => x.id === id);
            if (i !== -1) { calls[i].count++; calls.push(calls.splice(i, 1)[0]); } 
            else { calls.push({ id, count: 1 }); }
            if (calls.length > 5) calls.shift();
            render();
        }

        function render() {
            if (calls.length === 0) { disp.innerText = active ? "ГОТОВИЙ" : "ПАУЗА"; disp.style.color = "#0f0"; return; }
            disp.innerText = calls.map(x => x.count > 1 ? `${x.id}(${x.count})` : `${x.id}`).join(", ");
            disp.style.color = "#f44";
        }

        function upd() {
            const gap = parseFloat(document.getElementById('gapRange').value), size = document.getElementById('sizeRange').value;
            const exp = document.getElementById('expRange').value;
            document.getElementById('v-gap').innerText = gap; 
            document.getElementById('v-size').innerText = size;
            document.getElementById('v-exp').innerText = exp;
            ov.innerHTML = '';
            zones.forEach((z, i) => {
                z.x = 10 + (i * gap);
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", size); c.setAttribute("fill", "rgba(0,255,0,0.3)");
                c.setAttribute("stroke", "white"); ov.appendChild(c);
            });
        }

        function tglS() { const s = document.getElementById('settings-group'); s.style.display = (s.style.display === 'none') ? 'flex' : 'none'; }
        function tglA() { active = !active; const b = document.getElementById('start-btn'); b.innerText = active ? "🛑 СТОП" : "▶ СТАРТ"; b.classList.toggle('btn-stop', active); render(); }

        async function init() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, facingMode: "environment" } });
            vid.srcObject = s;
            loadPrefs();
            upd();
            loop();
        }

        function loop() {
            if (vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                // ЦИФРОВЕ ЗАТЕМНЕННЯ (не потребує драйверів)
                ctx.filter = `brightness(${document.getElementById('expRange').value})`;
                ctx.drawImage(vid, 0, 0);
                ctx.filter = 'none';

                zones.forEach(z => {
                    const x = Math.floor(canv.width * z.x / 100), y = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    const g = p[1] - (p[0] + p[2]) / 2;
                    if (active && g > 80) { if (!z.on) { reg(z.id, true); z.on = true; } } else { z.on = false; }
                });
            }
            requestAnimationFrame(loop);
        }

        function res() { calls = []; render(); }
        init();
    </script>
</body>
</html>
