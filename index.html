<div class="app-container">
  <div class="video-section">
    <canvas id="cameraCanvas"></canvas>
  </div>

  <div class="controls-section">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="switchTab('dots-tab')">ТОЧКИ</button>
      <button class="tab-btn" onclick="switchTab('params-tab')">ПАРАМЕТРИ</button>
    </div>

    <div id="dots-tab" class="tab-content active">
      <div class="control-group">
        <label>РОЗМІР ТОЧОК</label>
        <input type="range" id="dotSize" min="5" max="50" value="20">
      </div>
      <div class="control-group">
        <label>ВІДСТАНЬ МІЖ ТОЧКАМИ</label>
        <input type="range" id="dotSpacing" min="10" max="200" value="50">
      </div>
    </div>

    <div id="params-tab" class="tab-content">
      <div class="control-group">
        <label>FPS (ЧАСТОТА)</label>
        <input type="range" id="fpsRate" min="1" max="60" value="30">
      </div>
      <div class="control-group">
        <label>ПОРІГ ЯСКРАВОСТІ (DELTA)</label>
        <input type="range" id="deltaThreshold" min="0" max="255" value="50">
      </div>
    </div>
  </div>
</div>
