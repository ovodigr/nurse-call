<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Pro v13.5</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Зона списку (Верх) */
        #status-area { height: 12vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; }
        #call-display { font-size: 8vw; color: #0f0; font-weight: bold; text-align: center; }

        /* Відео-зона (Центр) */
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Кнопка шестерні поверх відео */
        .btn-gear { position: absolute; top: 10px; right: 10px; background: rgba(0,123,255,0.7); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; color: white; cursor: pointer; z-index: 100; }

        /* Панель керування (Низ) */
        .ui-panel { background: #1a1a1a; padding: 8px; border-top: 1px solid #333; }
        
        /* Блок налаштувань, що ховається */
        #settings-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .s-label { display: flex; justify-content: space-between; font-size: 14px; color: #0f0; }
        input[type=range] { width: 100%; height: 35px; margin: 0; } 

        /* Сітка тестових кнопок */
        .test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
        .t-btn { background: #333; border: 1px solid #555; border-radius: 4px; padding: 10px 0; color: white; font-weight: bold; font-size: 14px; }
        .t-btn:active { background: #d32f2f; }

        /* Нижні головні кнопки */
        .btn-row { display: flex; gap: 8px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; }
        .btn-start { background: #28a745; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; }
    </style>
</head>
<body>

    <div id="status-area">
        <div id="call-display">ГОТОВИЙ</div>
    </div>

    <div id="cam-box">
        <button class="btn-gear" onclick="toggleS()">⚙️</button>
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-group">
            <div>
                <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">16</span></div>
                <input type="range" id="sizeRange" min="5" max="100" value="16" oninput="upd()">
            </div>
            <div>
                <div class="s-label"><span>ВІДСТАНЬ</span><span id="v-gap">8.9</span></div>
                <input type="range" id="gapRange" min="2" max="15" value="8.9" step="0.1" oninput="upd()">
            </div>
            
            <div class="test-grid">
                <button class="t-btn" onclick="reg(1)">1</button>
                <button class="t-btn" onclick="reg(2)">2</button>
                <button class="t-btn" onclick="reg(3)">3</button>
                <button class="t-btn" onclick="reg(4)">4</button>
                <button class="t-btn" onclick="reg(5)">5</button>
                <button class="t-btn" onclick="reg(6)">6</button>
                <button class="t-btn" onclick="reg(7)">7</button>
                <button class="t-btn" onclick="reg(8)">8</button>
                <button class="t-btn" onclick="reg(9)">9</button>
                <button class="t-btn" onclick="reg(10)">10</button>
            </div>
        </div>

        <div class="btn-row">
            <button id="start-btn" class="btn-start" onclick="run()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="res()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';

        let active = false;
        let callList = [];
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, on: false }));

        const vid = document.getElementById('video');
        const disp = document.getElementById('call-display');
        const ov = document.getElementById('overlay');
        const canv = document.createElement('canvas');
        const ctx = canv.getContext('2d');

        function upd() {
            const gap = parseFloat(document.getElementById('gapRange').value);
            const size = document.getElementById('sizeRange').value;
            document.getElementById('v-gap').innerText = gap;
            document.getElementById('v-size').innerText = size;
            zones.forEach((z, i) => { z.x = 10 + (i * gap); });
            draw(size);
        }

        function draw(s) {
            ov.innerHTML = '';
            zones.forEach(z => {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", s); c.setAttribute("fill", "rgba(0,255,0,0.4)");
                c.setAttribute("stroke", "white");
                ov.appendChild(c);
            });
        }

        function toggleS() {
            const group = document.getElementById('settings-group');
            group.style.display = (group.style.display === 'none') ? 'flex' : 'none';
        }

        function reg(id) {
            if (callList[callList.length-1] !== id) {
                callList.push(id);
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ТЕСТ: Палата №' + id)}`);
                updDisp();
            }
        }

        function run() {
            active = !active;
            const b = document.getElementById('start-btn');
            b.innerText = active ? "🛑 СТОП" : "▶ СТАРТ";
            b.classList.toggle('btn-stop', active);
            updDisp();
        }

        function updDisp() {
            const unique = [...new Set(callList)].slice(-3).reverse();
            disp.innerText = active ? (unique.join(", ") || "АНАЛІЗ...") : "ПАУЗА";
        }

        async function init() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
            vid.srcObject = s;
            upd();
            loop();
        }

        function loop() {
            if (active && vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.drawImage(vid, 0, 0);
                zones.forEach(z => {
                    const x = Math.floor(canv.width * z.x / 100);
                    const y = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    if ((p[1] - (p[0] + p[2]) / 2) > 80) {
                        if (!z.on) {
                            reg(z.id);
                            z.on = true;
                        }
                    } else { z.on = false; }
                });
            }
            requestAnimationFrame(loop);
        }

        function res() { callList = []; disp.innerText = "ГОТОВИЙ"; }
        init();
    </script>
</body>
</html>
