<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Pro v14.1 Full</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Верхня панель зі списком палат */
        #status-area { height: 15vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; }
        #call-display { font-size: 10vw; color: #0f0; font-weight: bold; text-align: center; width: 100%; }

        /* Відео-монітор */
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Нижня панель керування */
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        
        /* Налаштування та Тестові кнопки */
        #settings-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .s-label { display: flex; justify-content: space-between; font-size: 14px; color: #0f0; font-weight: bold; }
        input[type=range] { width: 100%; height: 45px; margin: 0; cursor: pointer; } 

        /* Сітка кнопок 1-10 */
        .test-grid { display: grid; grid-template-columns: repeat(5, 2fr); gap: 6px; margin-bottom: 10px; }
        .t-btn { background: #333; border: 1px solid #555; border-radius: 8px; padding: 15px 0; color: white; font-weight: bold; font-size: 18px; touch-action: manipulation; }
        .t-btn:active { background: #d32f2f; transform: scale(0.95); }

        /* Головні кнопки керування */
        .btn-row { display: flex; gap: 10px; }
        button { padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 3; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; flex: 2; }
        .btn-gear { background: #007bff; flex: 1; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="status-area">
        <div id="call-display">ГОТОВИЙ</div>
    </div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-group">
            <div>
                <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">20</span></div>
                <input type="range" id="sizeRange" min="5" max="120" value="20" oninput="updateInterface()">
            </div>
            <div>
                <div class="s-label"><span>ВІДСТАНЬ (КРОК)</span><span id="v-gap">9.0</span></div>
                <input type="range" id="gapRange" min="2" max="18" value="9.0" step="0.1" oninput="updateInterface()">
            </div>
            
            <div class="test-grid">
                <button class="t-btn" onclick="manualRegister(1)">1</button>
                <button class="t-btn" onclick="manualRegister(2)">2</button>
                <button class="t-btn" onclick="manualRegister(3)">3</button>
                <button class="t-btn" onclick="manualRegister(4)">4</button>
                <button class="t-btn" onclick="manualRegister(5)">5</button>
                <button class="t-btn" onclick="manualRegister(6)">6</button>
                <button class="t-btn" onclick="manualRegister(7)">7</button>
                <button class="t-btn" onclick="manualRegister(8)">8</button>
                <button class="t-btn" onclick="manualRegister(9)">9</button>
                <button class="t-btn" onclick="manualRegister(10)">10</button>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="toggleSettingsPanel()">⚙️</button>
            <button id="start-btn" class="btn-start" onclick="toggleAnalysis()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="resetAll()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        // Налаштування Telegram
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';

        let isAnalysisActive = false;
        let callRegistry = [];
        let sensorZones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, isTriggered: false }));

        const videoElement = document.getElementById('video');
        const displayElement = document.getElementById('call-display');
        const overlaySvg = document.getElementById('overlay');
        const processingCanvas = document.createElement('canvas');
        const processingCtx = processingCanvas.getContext('2d', { willReadFrequently: true });

        // Функція для ручного тесту кнопок
        function manualRegister(id) {
            // Додаємо в список (навіть якщо такий самий був останнім, для наочності тесту)
            callRegistry.push(id);
            
            // Відправка в Telegram
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ТЕСТОВИЙ ВИКЛИК: Палата №' + id)}`)
                .catch(err => console.error("TG Error:", err));
            
            // Миттєве оновлення екрану
            updateDisplayUI();
            
            // Вібрація для зворотного зв'язку (якщо підтримується)
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // Оновлення положення точок через слайдери
        function updateInterface() {
            const currentGap = parseFloat(document.getElementById('gapRange').value);
            const currentSize = document.getElementById('sizeRange').value;
            
            document.getElementById('v-gap').innerText = currentGap;
            document.getElementById('v-size').innerText = currentSize;
            
            sensorZones.forEach((zone, index) => {
                zone.x = 10 + (index * currentGap);
            });
            
            renderMarkers(currentSize);
        }

        // Малювання кружечків на відео
        function renderMarkers(radius) {
            overlaySvg.innerHTML = '';
            sensorZones.forEach(zone => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", zone.x + "%");
                circle.setAttribute("cy", zone.y + "%");
                circle.setAttribute("r", radius);
                circle.setAttribute("fill", "rgba(0, 255, 0, 0.4)");
                circle.setAttribute("stroke", "white");
                circle.setAttribute("stroke-width", "2");
                overlaySvg.appendChild(circle);
            });
        }

        // Показ/приховування налаштувань
        function toggleSettingsPanel() {
            const panel = document.getElementById('settings-group');
            panel.style.display = (panel.style.display === 'none') ? 'flex' : 'none';
        }

        // Запуск/Зупинка аналізу камери
        function toggleAnalysis() {
            isAnalysisActive = !isAnalysisActive;
            const btn = document.getElementById('start-btn');
            
            if (isAnalysisActive) {
                btn.innerText = "🛑 ЗУПИНИТИ";
                btn.classList.add('btn-stop');
                displayElement.innerText = "АНАЛІЗ...";
            } else {
                btn.innerText = "▶ СТАРТ";
                btn.classList.remove('btn-stop');
                displayElement.innerText = "ПАУЗА";
            }
        }

        // Оновлення великих цифр на табло
        function updateDisplayUI() {
            // Беремо унікальні значення останніх викликів для відображення
            const recent = [...new Set(callRegistry)].slice(-4).reverse();
            if (recent.length > 0) {
                displayElement.innerText = recent.join(", ");
                displayElement.style.color = "#ff4444"; // Червоний при виклику
            } else {
                displayElement.innerText = isAnalysisActive ? "ГОТОВИЙ" : "ПАУЗА";
                displayElement.style.color = "#00ff00"; // Зелений коли пусто
            }
        }

        // Основний цикл обробки відео
        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                videoElement.srcObject = stream;
                updateInterface();
                requestAnimationFrame(analyzeFrame);
            } catch (e) {
                displayElement.innerText = "ПОМИЛКА КАМЕРИ";
            }
        }

        function analyzeFrame() {
            if (isAnalysisActive && videoElement.readyState === 4) {
                processingCanvas.width = videoElement.videoWidth;
                processingCanvas.height = videoElement.videoHeight;
                processingCtx.drawImage(videoElement, 0, 0);

                let detectedNew = false;

                sensorZones.forEach(zone => {
                    const imgX = Math.floor(processingCanvas.width * zone.x / 100);
                    const imgY = Math.floor(processingCanvas.height * zone.y / 100);
                    
                    // Перевірка межі кадру
                    if (imgX > 0 && imgX < processingCanvas.width) {
                        const pixel = processingCtx.getImageData(imgX, imgY, 1, 1).data;
                        // Формула для виділення зеленого діода
                        const greenVal = pixel[1] - (pixel[0] + pixel[2]) / 2;

                        if (greenVal > 75) { // Поріг чутливості
                            if (!zone.isTriggered) {
                                // Реєструємо виклик
                                if (callRegistry[callRegistry.length - 1] !== zone.id) {
                                    callRegistry.push(zone.id);
                                    manualRegister(zone.id); // Використовуємо ту ж логіку відправки
                                    detectedNew = true;
                                }
                                zone.isTriggered = true;
                            }
                        } else {
                            zone.isTriggered = false;
                        }
                    }
                });
                if (detectedNew) updateDisplayUI();
            }
            requestAnimationFrame(analyzeFrame);
        }

        function resetAll() {
            callRegistry = [];
            displayElement.innerText = "ГОТОВИЙ";
            displayElement.style.color = "#00ff00";
        }

        // Запуск при завантаженні
        startSystem();
    </script>
</body>
</html>
