<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Final v3.4</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #status-panel { background: #1a1a1a; padding: 10px; border-bottom: 2px solid #333; flex: 1; display: flex; flex-direction: column; }
        #calls-display { font-size: 34px; color: #ff4444; font-weight: bold; flex-grow: 1; overflow-y: auto; margin: 5px 0; border: 1px dashed #444; }
        
        .main-btn { width: 100%; padding: 12px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 5px; }
        .btn-reset { background: #d32f2f; }
        .btn-reload { background: #007bff; font-size: 14px; }
        .ver-info { font-size: 12px; color: #00ff00; }

        #video-container { position: relative; height: 35vh; background: #222; flex-shrink: 0; touch-action: none; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* ЦЯ ПАНЕЛЬ МАЄ БУТИ ВИДИМОЮ ЗНИЗУ */
        #test-slider { background: #333; border-top: 4px solid #ff0000; transition: transform 0.3s ease; flex-shrink: 0; position: relative; z-index: 100; }
        #test-slider.hidden { transform: translateY(calc(100% - 50px)); }
        .slider-handle { padding: 15px; text-align: center; background: #444; color: #ff0000; font-weight: bold; font-size: 16px; border-bottom: 1px solid #222; }
        
        #test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; background: #111; }
        .test-btn { padding: 15px 5px; background: #444; color: white; border: 1px solid #666; border-radius: 6px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-panel">
        <div style="display:flex; justify-content: space-between;">
            <strong>🔔 ВИКЛИКИ:</strong>
            <span class="ver-info">v3.4-ULTRA</span>
        </div>
        <div id="calls-display">ПОРОЖНЬО</div>
        <button class="main-btn btn-reset" onclick="clearCalls()">ОЧИСТИТИ ВСЕ</button>
        <button class="main-btn btn-reload" onclick="forceReload()">ОНОВИТИ КЕШ (v=)</button>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <svg id="overlay"></svg>
    </div>

    <div id="test-slider" class="hidden">
        <div class="slider-handle" onclick="document.getElementById('test-slider').classList.toggle('hidden')">
            🛑 ТИСНИ ТУТ (ТЕСТ ПАНЕЛЬ) 🛑
        </div>
        <div id="test-grid">
            <button class="test-btn" onclick="registerCall(1)">П1</button>
            <button class="test-btn" onclick="registerCall(2)">П2</button>
            <button class="test-btn" onclick="registerCall(3)">П3</button>
            <button class="test-btn" onclick="registerCall(4)">П4</button>
            <button class="test-btn" onclick="registerCall(5)">П5</button>
            <button class="test-btn" onclick="registerCall(6)">П6</button>
            <button class="test-btn" onclick="registerCall(7)">П7</button>
            <button class="test-btn" onclick="registerCall(8)">П8</button>
            <button class="test-btn" onclick="registerCall(9)">П9</button>
            <button class="test-btn" onclick="registerCall(10)">П10</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlay = document.getElementById('overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const display = document.getElementById('calls-display');
        
        let callRegistry = {};
        let selectedPoint = null;

        // Завантаження збережених координат
        let savedZones = localStorage.getItem('nurseZones');
        let zones = savedZones ? JSON.parse(savedZones) : Array.from({length: 10}, (_, i) => ({
            id: i + 1, x: 10 + (i * 8.8), y: 50, lastActive: false
        }));

        function drawMarkers() {
            overlay.innerHTML = '';
            zones.forEach((zone, index) => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", zone.x + "%");
                circle.setAttribute("cy", zone.y + "%");
                circle.setAttribute("r", "18"); 
                circle.setAttribute("fill", zone.lastActive ? "rgba(255, 0, 0, 0.7)" : "rgba(0, 255, 0, 0.4)");
                circle.setAttribute("stroke", "white");
                circle.setAttribute("stroke-width", "3");
                
                circle.onpointerdown = (e) => { selectedPoint = index; circle.setPointerCapture(e.pointerId); };
                circle.onpointermove = (e) => {
                    if (selectedPoint === index) {
                        const rect = overlay.getBoundingClientRect();
                        zones[index].x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
                        zones[index].y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
                        drawMarkers();
                        localStorage.setItem('nurseZones', JSON.stringify(zones)); // Збереження
                    }
                };
                circle.onpointerup = () => { selectedPoint = null; };
                
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", zone.x + "%");
                text.setAttribute("y", (zone.y + 1) + "%");
                text.setAttribute("fill", "white");
                text.setAttribute("font-size", "14");
                text.setAttribute("font-weight", "bold");
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("dominant-baseline", "middle");
                text.textContent = zone.id;
                text.style.pointerEvents = "none";

                g.appendChild(circle);
                g.appendChild(text);
                overlay.appendChild(g);
            });
        }

        drawMarkers();

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("Помилка камери!"); }
        }

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                let stateChanged = false;
                zones.forEach(zone => {
                    const x = Math.floor(canvas.width * zone.x / 100);
                    const y = Math.floor(canvas.height * zone.y / 100);
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const brightness = (pixel[0] + pixel[1] + pixel[2]) / 3;
                    const isActive = brightness > 190;
                    if (isActive && !zone.lastActive) { registerCall(zone.id); stateChanged = true; }
                    if (isActive !== zone.lastActive) { zone.lastActive = isActive; stateChanged = true; }
                });
                if (stateChanged) drawMarkers();
            }
            requestAnimationFrame(processFrame);
        }

        function forceReload() {
            window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
        }

        function registerCall(id) {
            callRegistry[id] = (callRegistry[id] || 0) + 1;
            updateUI();
        }

        function updateUI() {
            const keys = Object.keys(callRegistry).sort((a, b) => Number(a) - Number(b));
            display.innerText = keys.length === 0 ? "ПОРОЖНЬО" : keys.map(id => `${id}(${callRegistry[id]})`).join(", ");
        }

        function clearCalls() { callRegistry = {}; updateUI(); }

        startCamera();
        video.addEventListener('play', () => requestAnimationFrame(processFrame));
    </script>
</body>
</html>
