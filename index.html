<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Smart v18.5 Landscape</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Адаптивне табло */
        #status-area { min-height: 10vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; padding: 5px; }
        #call-display { font-size: 8vw; color: #f44; font-weight: bold; text-align: center; width: 100%; transition: all 0.3s; }

        /* Відео */
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Панель керування */
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        #settings-scroll { display: none; flex-direction: column; gap: 10px; max-height: 40vh; overflow-y: auto; padding-bottom: 10px; }
        
        /* Стилі для горизонтального режиму */
        @media screen and (orientation: landscape) {
            #status-area { min-height: 15vh; }
            #call-display { font-size: 10vh; } /* Робимо цифри викликів величезними */
            #settings-scroll { max-height: 30vh; }
        }

        .section-title { font-size: 11px; color: #007bff; font-weight: bold; margin-top: 8px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .s-label { display: flex; justify-content: space-between; font-size: 13px; color: #0f0; margin-top: 5px; }
        input[type=range] { width: 100%; height: 35px; cursor: pointer; } 
        .log-area { background: #050505; color: #8a8; font-family: monospace; font-size: 10px; padding: 5px; border: 1px solid #222; height: 80px; overflow-y: scroll; margin-top: 5px; white-space: pre-wrap; }
        .btn-row { display: flex; gap: 8px; margin-top: 5px; }
        button { border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 3; padding: 15px; font-size: 18px; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; flex: 2; }
        .btn-gear { background: #007bff; flex: 1; font-size: 20px; }
    </style>
</head>
<body>

    <div id="status-area"><div id="call-display">ГОТОВИЙ</div></div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-scroll">
            <div class="section-title">Налаштування</div>
            <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">20</span></div>
            <input type="range" id="sizeRange" min="5" max="100" value="20" oninput="saveUpd()">
            <div class="s-label"><span>ВІДСТАНЬ</span><span id="v-gap">9.0</span></div>
            <input type="range" id="gapRange" min="2" max="15" value="9.0" step="0.1" oninput="saveUpd()">
            <div class="s-label"><span>ЦИФРОВА ЯСКРАВІСТЬ</span><span id="v-exp">1.0</span></div>
            <input type="range" id="expRange" min="0.1" max="2.0" value="1.0" step="0.05" oninput="saveUpd()">

            <div class="section-title">Лог (v18.5)</div>
            <div id="log-box" class="log-area">Натисніть СТАРТ для логування...</div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button style="flex:1; background:#555; padding:8px; border-radius:5px; font-size:12px;" onclick="clearLog()">ОЧИСТИТИ</button>
                <button style="flex:1; background:#007bff; padding:8px; border-radius:5px; font-size:12px;" onclick="copyLog()">КОПІЮВАТИ</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px; margin-top:10px;">
                <script>for(let i=1; i<=10; i++) document.write(`<button style="background:#333; border:1px solid #555; border-radius:6px; padding:10px 0; color:white; font-weight:bold;" onclick="reg(${i})">${i}</button>`);</script>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="tglS()">⚙️</button>
            <button id="start-btn" class="btn-start" onclick="tglA()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="res()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';
        let act = false, calls = [], logs = [], lastVals = [];
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, on: false, baseline: 0, lastG: 0 }));

        const vid = document.getElementById('video'), disp = document.getElementById('call-display'), lb = document.getElementById('log-box');
        const ov = document.getElementById('overlay'), canv = document.createElement('canvas'), ctx = canv.getContext('2d');

        function addLog(m) {
            if (!act) return;
            logs.push(`[${new Date().toLocaleTimeString('uk-UA',{hour12:false})}] ${m}`);
            if (logs.length > 50) logs.shift();
            lb.innerText = logs.join('\n'); lb.scrollTop = lb.scrollHeight;
        }

        function clearLog() { logs = []; lb.innerText = "Лог очищено."; }
        function copyLog() { navigator.clipboard.writeText(logs.join('\n')).then(() => alert("Лог у буфері!")); }

        function saveUpd() {
            localStorage.setItem('vP', JSON.stringify({s:document.getElementById('sizeRange').value, g:document.getElementById('gapRange').value, e:document.getElementById('expRange').value}));
            upd();
        }

        function reg(id, cam = false) {
            if (cam && !act) return;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ПАЛАТА №' + id)}`);
            addLog(`ПАЛАТА №${id}${cam ? ' (АВТО)' : ' (ТЕСТ)'}`);
            let i = calls.findIndex(x => x.id === id);
            if (i !== -1) { calls[i].count++; calls.push(calls.splice(i, 1)[0]); } else { calls.push({ id, count: 1 }); }
            if (calls.length > 5) calls.shift();
            render();
        }

        function render() {
            if (calls.length === 0) { disp.innerText = act ? "ГОТОВИЙ" : "ПАУЗА"; disp.style.color = "#0f0"; return; }
            disp.innerText = calls.map(x => x.count > 1 ? `${x.id}(${x.count})` : `${x.id}`).join(", ");
            disp.style.color = "#f44";
        }

        function upd() {
            const gap = parseFloat(document.getElementById('gapRange').value), size = document.getElementById('sizeRange').value;
            document.getElementById('v-size').innerText = size; document.getElementById('v-gap').innerText = gap; document.getElementById('v-exp').innerText = document.getElementById('expRange').value;
            ov.innerHTML = '';
            zones.forEach((z, i) => {
                z.x = 10 + (i * gap);
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", size); c.setAttribute("fill", "rgba(0,255,0,0.3)");
                c.setAttribute("stroke", "white"); ov.appendChild(c);
            });
        }

        function tglS() { const s = document.getElementById('settings-scroll'); s.style.display = (s.style.display === 'none') ? 'flex' : 'none'; }
        function tglA() { 
            act = !act; document.getElementById('start-btn').innerText = act ? "🛑 СТОП" : "▶ СТАРТ";
            document.getElementById('start-btn').classList.toggle('btn-stop', act);
            if (act) { addLog("ЗАПУСК..."); setTimeout(() => { zones.forEach(z => z.baseline = z.lastG); addLog("Готово."); }, 1000); }
            render(); 
        }

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, facingMode: "environment" } });
                vid.srcObject = s;
                const p = JSON.parse(localStorage.getItem('vP') || '{}');
                if(p.s) document.getElementById('sizeRange').value = p.s;
                if(p.g) document.getElementById('gapRange').value = p.g;
                if(p.e) document.getElementById('expRange').value = p.e;
                upd(); loop();
            } catch (e) { disp.innerText = "ПОМИЛКА"; }
        }

        function loop() {
            if (vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.filter = `brightness(${document.getElementById('expRange').value})`;
                ctx.drawImage(vid, 0, 0); ctx.filter = 'none';
                let det = [];
                zones.forEach((z, idx) => {
                    const x = Math.floor(canv.width * z.x / 100), y = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    const g = Math.floor(p[1] - (p[0] + p[2]) / 2);
                    z.lastG = g;
                    if (act && Math.abs(g - (lastVals[idx] || 0)) > 12) {
                        addLog(`З ${z.id}: ${g} (б:${Math.floor(z.baseline)})`);
                        lastVals[idx] = g;
                    }
                    if (act && g > 80 && g > (z.baseline + 35)) det.push(z.id);
                });
                if (det.length > 0 && det.length < 4) {
                    det.forEach(id => { let z = zones.find(zn => zn.id === id); if (!z.on) { reg(id, true); z.on = true; } });
                }
                zones.forEach(z => { if (!det.includes(z.id)) z.on = false; });
            }
            requestAnimationFrame(loop);
        }

        function res() { calls = []; render(); }
        init();
    </script>
</body>
</html>
