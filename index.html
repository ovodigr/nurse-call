<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Monitor V3</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхня панель зі списком */
        #status-panel { background: #1a1a1a; padding: 10px; border-bottom: 2px solid #333; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #calls-display { font-size: 28px; color: #ff4444; font-weight: bold; flex-grow: 1; overflow-y: auto; margin-bottom: 10px; }
        
        .main-btn { width: 100%; padding: 12px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 5px; }
        .btn-reset { background: #d32f2f; }
        .btn-pause { background: #444; font-size: 14px; }
        .btn-pause.active { background: #fbc02d; color: #000; }

        /* Контейнер відео */
        #video-container { position: relative; height: 30vh; background: #000; flex-shrink: 0; touch-action: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* Висувна панель тестів */
        #test-slider { background: #222; border-top: 1px solid #444; transition: transform 0.3s ease; flex-shrink: 0; }
        #test-slider.hidden { transform: translateY(85%); }
        .slider-handle { padding: 8px; text-align: center; background: #333; font-size: 12px; color: #aaa; cursor: pointer; }
        
        #test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .test-btn { padding: 10px; background: #444; color: white; border: 1px solid #666; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="status-panel">
        <strong>🔔 ВИКЛИКИ:</strong>
        <div id="calls-display">Список порожній</div>
        <button class="main-btn btn-reset" onclick="clearCalls()">СКИДАННЯ</button>
        <button id="pause-btn" class="main-btn btn-pause" onclick="togglePause()">ПАУЗА КАМЕРИ</button>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <svg id="overlay"></svg>
    </div>

    <div id="test-slider">
        <div class="slider-handle" onclick="document.getElementById('test-slider').classList.toggle('hidden')">
            ▲ ТЕСТОВІ КНОПКИ (ПРИХОВАТИ/ПОКАЗАТИ) ▲
        </div>
        <div id="test-grid">
            <button class="test-btn" onclick="registerCall(1)">П1</button>
            <button class="test-btn" onclick="registerCall(2)">П2</button>
            <button class="test-btn" onclick="registerCall(3)">П3</button>
            <button class="test-btn" onclick="registerCall(4)">П4</button>
            <button class="test-btn" onclick="registerCall(5)">П5</button>
            <button class="test-btn" onclick="registerCall(6)">П6</button>
            <button class="test-btn" onclick="registerCall(7)">П7</button>
            <button class="test-btn" onclick="registerCall(8)">П8</button>
            <button class="test-btn" onclick="registerCall(9)">П9</button>
            <button class="test-btn" onclick="registerCall(10)">П10</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlay = document.getElementById('overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const display = document.getElementById('calls-display');
        const pauseBtn = document.getElementById('pause-btn');
        
        let callRegistry = {};
        let isPaused = false;
        let selectedPoint = null;

        let zones = Array.from({length: 10}, (_, i) => ({
            id: i + 1, x: 10 + (i * 8.8), y: 50, lastActive: false
        }));

        function drawMarkers() {
            overlay.innerHTML = '';
            zones.forEach((zone, index) => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", zone.x + "%");
                circle.setAttribute("cy", zone.y + "%");
                circle.setAttribute("r", "12"); 
                circle.setAttribute("fill", "rgba(0, 255, 0, 0.4)");
                circle.setAttribute("stroke", "white");
                circle.setAttribute("stroke-width", "2");
                circle.style.cursor = "move";
                
                // Швидке захоплення точки
                circle.onpointerdown = (e) => { 
                    selectedPoint = index; 
                    circle.setPointerCapture(e.pointerId);
                };
                circle.onpointermove = (e) => {
                    if (selectedPoint === index) {
                        const rect = overlay.getBoundingClientRect();
                        zones[index].x = ((e.clientX - rect.left) / rect.width) * 100;
                        zones[index].y = ((e.clientY - rect.top) / rect.height) * 100;
                        drawMarkers();
                    }
                };
                circle.onpointerup = () => { selectedPoint = null; };
                overlay.appendChild(circle);
            });
        }

        drawMarkers();

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        function processFrame() {
            if (!isPaused && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                zones.forEach(zone => {
                    const x = canvas.width * zone.x / 100;
                    const y = canvas.height * zone.y / 100;
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const brightness = (pixel[0] + pixel[1] + pixel[2]) / 3;
                    const isActive = brightness > 200;
                    if (isActive && !zone.lastActive) { registerCall(zone.id); }
                    zone.lastActive = isActive;
                });
            }
            requestAnimationFrame(processFrame);
        }

        function registerCall(id) {
            callRegistry[id] = (callRegistry[id] || 0) + 1;
            updateUI();
        }

        function updateUI() {
            const keys = Object.keys(callRegistry).sort((a, b) => Number(a) - Number(b));
            display.innerText = keys.length === 0 ? "Порожньо" : keys.map(id => `${id}(${callRegistry[id]})`).join(", ");
        }

        function clearCalls() { callRegistry = {}; updateUI(); }
        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "ВІДНОВИТИ" : "ПАУЗА КАМЕРИ";
            pauseBtn.classList.toggle('active', isPaused);
        }

        video.addEventListener('play', () => requestAnimationFrame(processFrame));
    </script>
</body>
</html>
