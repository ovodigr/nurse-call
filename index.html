<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Vellez Smart v10.0</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #display { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 12vw; color: #0f0; text-align: center; font-weight: bold; }
        
        /* Панель налаштувань */
        #settings-panel { 
            background: #1a1a1a; padding: 15px; display: none; 
            flex-direction: column; gap: 10px; border-top: 2px solid #333;
        }
        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        input[type=range] { flex-grow: 1; }

        /* Відео-контейнер */
        #video-wrap { position: relative; width: 100%; max-height: 40vh; background: #000; display: flex; justify-content: center; }
        video { width: 100%; height: auto; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; }

        /* Кнопки */
        .ui-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #111; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-start { background: #28a745; grid-column: span 2; font-size: 18px; }
        .btn-stop { background: #dc3545 !important; }
        .btn-util { background: #444; }
        .btn-settings { background: #007bff; }
    </style>
</head>
<body>

    <div id="display">ПАУЗА</div>

    <div id="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div id="settings-panel">
        <div class="control-row">
            <label>Розмір точок:</label>
            <input type="range" id="sizeRange" min="5" max="50" value="15" oninput="updateLayout()">
        </div>
        <div class="control-row">
            <label>Відстань між ними:</label>
            <input type="range" id="gapRange" min="2" max="15" value="8" step="0.1" oninput="updateLayout()">
        </div>
        <div class="control-row">
            <label>Чутливість (зелений):</label>
            <input type="range" id="sensRange" min="30" max="150" value="80" oninput="updateSens()">
        </div>
    </div>

    <div class="ui-main">
        <button id="start-btn" class="btn-start" onclick="toggleEngine()">▶️ ЗАПУСТИТИ АНАЛІЗ</button>
        <button class="btn-util" onclick="clearCalls()">ОЧИСТИТИ (SPACE)</button>
        <button class="btn-settings" onclick="toggleSettings()">⚙️ НАЛАШТУВАННЯ</button>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TELEGRAM_CHAT_ID = '-1002345678912'; // Сюди встав ID групи з мінусом

        let isRunning = false;
        let callList = [];
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, lastActive: false }));

        const video = document.getElementById('video');
        const display = document.getElementById('display');
        const overlay = document.getElementById('overlay');
        const procCanvas = document.createElement('canvas');
        const procCtx = procCanvas.getContext('2d');

        // Оновлення геометрії точок через слайдери
        function updateLayout() {
            const gap = parseFloat(document.getElementById('gapRange').value);
            const size = document.getElementById('sizeRange').value;
            
            zones.forEach((zone, i) => {
                zone.x = 10 + (i * gap); // Початковий відступ 10% + крок
            });
            drawMarkers(size);
        }

        function drawMarkers(size = 15) {
            overlay.innerHTML = '';
            zones.forEach(zone => {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", zone.x + "%");
                c.setAttribute("cy", zone.y + "%");
                c.setAttribute("r", size);
                c.setAttribute("fill", "rgba(0, 255, 0, 0.3)");
                c.setAttribute("stroke", "white");
                overlay.appendChild(c);
            });
        }

        function toggleEngine() {
            isRunning = !isRunning;
            const btn = document.getElementById('start-btn');
            btn.innerText = isRunning ? "🛑 ЗУПИНИТИ" : "▶️ ЗАПУСТИТИ АНАЛІЗ";
            btn.classList.toggle('btn-stop', isRunning);
            display.innerText = isRunning ? "ГОТОВИЙ" : "ПАУЗА";
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendTelegram(id) {
            if (!isRunning) return;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent('🚨 ВИКЛИК: Палата №' + id)}`);
        }

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            updateLayout();
            requestAnimationFrame(process);
        }

        function process() {
            if (isRunning && video.readyState === video.HAVE_ENOUGH_DATA) {
                procCanvas.width = video.videoWidth;
                procCanvas.height = video.videoHeight;
                procCtx.drawImage(video, 0, 0);

                zones.forEach(zone => {
                    const x = Math.floor(procCanvas.width * zone.x / 100);
                    const y = Math.floor(procCanvas.height * zone.y / 100);
                    const p = procCtx.getImageData(x, y, 1, 1).data;
                    
                    const greenIntensity = p[1] - (p[0] + p[2]) / 2;
                    const active = greenIntensity > document.getElementById('sensRange').value;

                    if (active && !zone.lastActive) {
                        if (callList[callList.length - 1] !== zone.id) {
                            callList.push(zone.id);
                            sendTelegram(zone.id);
                            updateUI();
                        }
                    }
                    zone.lastActive = active;
                });
            }
            requestAnimationFrame(process);
        }

        function updateUI() {
            const text = [...new Set(callList)].slice(-3).reverse().join(", ");
            display.innerText = text || "ГОТОВИЙ";
            display.style.color = text ? "#f00" : "#0f0";
        }

        function clearCalls() { callList = []; updateUI(); }
        window.onkeydown = (e) => { if(e.code === 'Space') clearCalls(); };

        init();
    </script>
</body>
</html>
