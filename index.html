<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez v3.6</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Панель викликів */
        #status-panel { background: #1a1a1a; padding: 8px; border-bottom: 2px solid #333; height: 32vh; display: flex; flex-direction: column; }
        #calls-display { font-size: 32px; color: #ff4444; font-weight: bold; flex-grow: 1; overflow-y: auto; margin: 4px 0; border: 1px dashed #444; padding: 4px; line-height: 1.2; }
        
        .main-btn { width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-reset { background: #d32f2f; height: 45px; font-size: 18px; margin-bottom: 4px; }
        .btn-reload { background: #007bff; font-size: 12px; height: 35px; }
        .btn-pause { background: #444; font-size: 12px; height: 35px; }
        .btn-pause.active { background: #fbc02d; color: #000; }
        .ver-info { font-size: 10px; color: #00ff00; opacity: 0.8; }

        /* Відео */
        #video-container { position: relative; height: 33vh; background: #111; touch-action: none; border-top: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* Компактні кнопки */
        #test-panel { height: 35vh; background: #111; padding: 4px; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr); gap: 4px; }
        .test-btn { background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .test-btn:active { background: #555; }
    </style>
</head>
<body>

    <div id="status-panel">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <strong>🔔 ПАЛАТИ:</strong>
            <span class="ver-info">v3.6 [16:55:10]</span>
        </div>
        <div id="calls-display">ПОРОЖНЬО</div>
        <button class="main-btn btn-reset" onclick="clearCalls()">ОЧИСТИТИ ВСЕ</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="main-btn btn-reload" onclick="forceReload()">ОНОВИТИ (v=)</button>
            <button id="pause-btn" class="main-btn btn-pause" onclick="togglePause()">ПАУЗА АВТО</button>
        </div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <svg id="overlay"></svg>
    </div>

    <div id="test-panel">
        <button class="test-btn" onclick="registerCall(1)">1</button>
        <button class="test-btn" onclick="registerCall(2)">2</button>
        <button class="test-btn" onclick="registerCall(3)">3</button>
        <button class="test-btn" onclick="registerCall(4)">4</button>
        <button class="test-btn" onclick="registerCall(5)">5</button>
        <button class="test-btn" onclick="registerCall(6)">6</button>
        <button class="test-btn" onclick="registerCall(7)">7</button>
        <button class="test-btn" onclick="registerCall(8)">8</button>
        <button class="test-btn" onclick="registerCall(9)">9</button>
        <button class="test-btn" onclick="registerCall(10)">10</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlay = document.getElementById('overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const display = document.getElementById('calls-display');
        const pauseBtn = document.getElementById('pause-btn');
        
        let callRegistry = {};
        let isPaused = false;
        let selectedPoint = null;

        let savedZones = localStorage.getItem('nurseZones');
        let zones = savedZones ? JSON.parse(savedZones) : Array.from({length: 10}, (_, i) => ({
            id: i + 1, x: 10 + (i * 8.8), y: 50, lastActive: false
        }));

        function drawMarkers() {
            overlay.innerHTML = '';
            zones.forEach((zone, index) => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", zone.x + "%");
                circle.setAttribute("cy", zone.y + "%");
                circle.setAttribute("r", "18"); 
                circle.setAttribute("fill", zone.lastActive ? "rgba(255, 0, 0, 0.7)" : "rgba(0, 255, 0, 0.4)");
                circle.setAttribute("stroke", "white");
                circle.setAttribute("stroke-width", "3");
                
                circle.onpointerdown = (e) => { selectedPoint = index; circle.setPointerCapture(e.pointerId); };
                circle.onpointermove = (e) => {
                    if (selectedPoint === index) {
                        const rect = overlay.getBoundingClientRect();
                        zones[index].x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
                        zones[index].y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
                        drawMarkers();
                        localStorage.setItem('nurseZones', JSON.stringify(zones));
                    }
                };
                circle.onpointerup = () => { selectedPoint = null; };
                
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", zone.x + "%");
                text.setAttribute("y", (zone.y + 1) + "%");
                text.setAttribute("fill", "white");
                text.setAttribute("font-size", "14");
                text.setAttribute("font-weight", "bold");
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("dominant-baseline", "middle");
                text.textContent = zone.id;
                text.style.pointerEvents = "none";

                g.appendChild(circle);
                g.appendChild(text);
                overlay.appendChild(g);
            });
        }

        drawMarkers();

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { console.error("Cam error"); }
        }

        function processFrame() {
            if (!isPaused && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                let stateChanged = false;
                zones.forEach(zone => {
                    const x = Math.floor(canvas.width * zone.x / 100);
                    const y = Math.floor(canvas.height * zone.y / 100);
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const brightness = (pixel[0] + pixel[1] + pixel[2]) / 3;
                    const isActive = brightness > 190;
                    if (isActive && !zone.lastActive) { registerCall(zone.id); stateChanged = true; }
                    if (isActive !== zone.lastActive) { zone.lastActive = isActive; stateChanged = true; }
                });
                if (stateChanged) drawMarkers();
            }
            requestAnimationFrame(processFrame);
        }

        function forceReload() {
            window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
        }

        function registerCall(id) {
            callRegistry[id] = (callRegistry[id] || 0) + 1;
            updateUI();
        }

        function updateUI() {
            const keys = Object.keys(callRegistry).sort((a, b) => Number(a) - Number(b));
            display.innerText = keys.length === 0 ? "ПОРОЖНЬО" : keys.map(id => `${id}(${callRegistry[id]})`).join(", ");
        }

        function clearCalls() { callRegistry = {}; updateUI(); }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "ВІДНОВИТИ" : "ПАУЗА АВТО";
            pauseBtn.classList.toggle('active', isPaused);
        }

        startCamera();
        video.addEventListener('play', () => requestAnimationFrame(processFrame));
    </script>
</body>
</html>
