<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Monitor GitHub</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Список займає максимум місця */
        #status-panel { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #333; flex-grow: 1; display: flex; flex-direction: column; }
        #calls-display { font-size: 40px; color: #ff4444; font-weight: bold; margin-top: 10px; line-height: 1.2; overflow-y: auto; flex-grow: 1; word-wrap: break-word; }
        
        #video-container { position: relative; height: 25vh; background: #000; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-top: 1px solid #444; }
        video { height: 100%; width: auto; max-width: 100%; transform: scaleX(1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #test-panel { background: #111; padding: 5px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; flex-shrink: 0; }
        .test-btn { padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .test-btn:active { background: #c62828; }
        
        .controls { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; flex-shrink: 0; }
        button.reset { background: #d32f2f; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 18px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="status-panel">
        <div><strong>🔔 Активні виклики (10 палат):</strong></div>
        <div id="calls-display">Список порожній</div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <svg id="overlay"></svg>
    </div>

    <div id="test-panel">
        <button class="test-btn" onclick="simulate(1)">П1</button>
        <button class="test-btn" onclick="simulate(2)">П2</button>
        <button class="test-btn" onclick="simulate(3)">П3</button>
        <button class="test-btn" onclick="simulate(4)">П4</button>
        <button class="test-btn" onclick="simulate(5)">П5</button>
        <button class="test-btn" onclick="simulate(6)">П6</button>
        <button class="test-btn" onclick="simulate(7)">П7</button>
        <button class="test-btn" onclick="simulate(8)">П8</button>
        <button class="test-btn" onclick="simulate(9)">П9</button>
        <button class="test-btn" onclick="simulate(10)">П10</button>
    </div>

    <div class="controls">
        <div style="font-size: 12px; color: #666;">Наведіть точки на діоди</div>
        <button class="reset" onclick="clearCalls()">ОЧИСТИТИ</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlay = document.getElementById('overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const display = document.getElementById('calls-display');
        
        let callRegistry = {};
        const zones = Array.from({length: 10}, (_, i) => ({
            id: i + 1, x: 10 + (i * 8.8), y: 70, lastActive: false
        }));

        function drawMarkers() {
            overlay.innerHTML = '';
            zones.forEach(zone => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", zone.x + "%");
                circle.setAttribute("cy", zone.y + "%");
                circle.setAttribute("r", "5");
                circle.setAttribute("fill", "#00ff00");
                circle.setAttribute("stroke", "white");
                overlay.appendChild(circle);
            });
        }
        drawMarkers();

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Потрібен HTTPS або доступ до камери: " + err));

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                zones.forEach(zone => {
                    const x = canvas.width * zone.x / 100;
                    const y = canvas.height * zone.y / 100;
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const brightness = (pixel[0] + pixel[1] + pixel[2]) / 3;
                    const isActive = brightness > 190;
                    if (isActive && !zone.lastActive) { registerCall(zone.id); }
                    zone.lastActive = isActive;
                });
            }
            requestAnimationFrame(processFrame);
        }

        function registerCall(id) {
            callRegistry[id] = (callRegistry[id] || 0) + 1;
            updateUI();
        }

        function simulate(id) { registerCall(id); }

        function updateUI() {
            const keys = Object.keys(callRegistry).sort((a, b) => Number(a) - Number(b));
            display.innerText = keys.length === 0 ? "Список порожній" : keys.map(id => `${id}(${callRegistry[id]})`).join(", ");
        }

        function clearCalls() { callRegistry = {}; updateUI(); }
        video.addEventListener('play', () => requestAnimationFrame(processFrame));
    </script>
</body>
</html>
