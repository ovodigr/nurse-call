<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Ultimate Control v17.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #status-area { height: 12vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; }
        #call-display { font-size: 8vw; color: #f44; font-weight: bold; text-align: center; width: 100%; }
        #cam-box { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; overflow-y: auto; max-height: 45vh; }
        #settings-group { display: none; flex-direction: column; gap: 8px; }
        .section-title { font-size: 12px; color: #007bff; font-weight: bold; margin-top: 10px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .s-label { display: flex; justify-content: space-between; font-size: 13px; color: #0f0; margin-top: 5px; }
        input[type=range] { width: 100%; height: 35px; cursor: pointer; } 
        
        .test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .t-btn { background: #333; border: 1px solid #555; border-radius: 6px; padding: 12px 0; color: white; font-weight: bold; }
        .btn-row { display: flex; gap: 10px; margin-top: 5px; }
        button { padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 3; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; flex: 2; }
        .btn-gear { background: #007bff; flex: 1; font-size: 22px; }
        #diag { font-size: 11px; color: #888; text-align: center; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="status-area"><div id="call-display">ГОТОВИЙ</div></div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-group">
            <div class="section-title">Налаштування зон моніторингу</div>
            <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">18</span></div>
            <input type="range" id="sizeRange" min="5" max="100" value="18" oninput="upd()">
            <div class="s-label"><span>ВІДСТАНЬ (КРОК)</span><span id="v-gap">9.2</span></div>
            <input type="range" id="gapRange" min="2" max="15" value="9.2" step="0.1" oninput="upd()">

            <div class="section-title">Залізні налаштування камери</div>
            <div class="s-label"><span>ЯСКРАВІСТЬ (EXPOSURE)</span><span id="v-exp">0</span></div>
            <input type="range" id="expRange" min="-10" max="10" step="1" value="0" oninput="applyCamSettings()">
            
            <div class="s-label"><span>ФОКУС (РУЧНИЙ)</span><span id="v-foc">50</span></div>
            <input type="range" id="focRange" min="0" max="100" step="1" value="50" oninput="applyCamSettings()">

            <div id="diag">Діагностика: очікування...</div>
            <div class="test-grid">
                <script>for(let i=1; i<=10; i++) document.write(`<button class="t-btn" onclick="reg(${i})">${i}</button>`);</script>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="tglS()">⚙️</button>
            <button id="start-btn" class="btn-start" onclick="tglA()">▶ СТАРТ АНАЛІЗУ</button>
            <button class="btn-clear" onclick="res()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';
        let act = false, calls = [], videoTrack = null;
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, on: false }));

        const vid = document.getElementById('video'), disp = document.getElementById('call-display');
        const ov = document.getElementById('overlay'), canv = document.createElement('canvas'), ctx = canv.getContext('2d');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "environment" } 
                });
                vid.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                setTimeout(applyCamSettings, 1000); // Даємо камері час ініціалізуватися
                upd(); loop();
            } catch (e) { disp.innerText = "ПОМИЛКА ДОСТУПУ"; }
        }

        // Керування апаратними функціями камери
        async function applyCamSettings() {
            if (!videoTrack) return;
            const caps = videoTrack.getCapabilities();
            const expVal = document.getElementById('expRange').value;
            const focVal = document.getElementById('focRange').value;
            document.getElementById('v-exp').innerText = expVal;
            document.getElementById('v-foc').innerText = focVal;

            const constraints = { advanced: [] };
            const settings = {};

            // Вимикаємо авто-експозицію і ставимо вручну
            if (caps.exposureMode?.includes('manual')) settings.exposureMode = 'manual';
            if (caps.exposureCompensation) settings.exposureCompensation = expVal;

            // Вимикаємо авто-фокус
            if (caps.focusMode?.includes('manual')) settings.focusMode = 'manual';
            if (caps.focusDistance) settings.focusDistance = focVal / 10;

            // Вимикаємо авто-баланс білого
            if (caps.whiteBalanceMode?.includes('manual')) settings.whiteBalanceMode = 'manual';

            constraints.advanced.push(settings);
            try {
                await videoTrack.applyConstraints(constraints);
            } catch (err) {
                console.warn("Камера обмежила деякі налаштування");
            }
        }

        function reg(id, isCam = false) {
            if (isCam && !act) return;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ВИКЛИК: Палата №' + id)}`);
            let idx = calls.findIndex(x => x.id === id);
            if (idx !== -1) { calls[idx].count++; calls.push(calls.splice(idx, 1)[0]); } 
            else { calls.push({ id, count: 1 }); }
            if (calls.length > 5) calls.shift();
            render();
        }

        function render() {
            if (calls.length === 0) { disp.innerText = act ? "ГОТОВИЙ" : "ПАУЗА"; disp.style.color = "#0f0"; return; }
            disp.innerText = calls.map(x => x.count > 1 ? `${x.id}(${x.count})` : `${x.id}`).join(", ");
            disp.style.color = "#f44";
        }

        function upd() {
            const gap = parseFloat(document.getElementById('gapRange').value), size = document.getElementById('sizeRange').value;
            document.getElementById('v-gap').innerText = gap; document.getElementById('v-size').innerText = size;
            ov.innerHTML = '';
            zones.forEach((z, i) => {
                z.x = 10 + (i * gap);
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", size); c.setAttribute("fill", "rgba(0,255,0,0.3)");
                c.setAttribute("stroke", "white"); ov.appendChild(c);
            });
        }

        function tglS() { const s = document.getElementById('settings-group'); s.style.display = (s.style.display === 'none') ? 'flex' : 'none'; }
        function tglA() { act = !act; const b = document.getElementById('start-btn'); b.innerText = act ? "🛑 СТОП" : "▶ СТАРТ"; b.classList.toggle('btn-stop', act); render(); }

        function loop() {
            if (vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.drawImage(vid, 0, 0);
                let debugValues = [];
                zones.forEach(z => {
                    const px = Math.floor(canv.width * z.x / 100), py = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(px, py, 1, 1).data;
                    const g = p[1] - (p[0] + p[2]) / 2;
                    debugValues.push(Math.floor(g));
                    if (act && g > 80) { if (!z.on) { reg(z.id, true); z.on = true; } } else { z.on = false; }
                });
                document.getElementById('diag').innerText = "Зелений: " + debugValues.join(" | ");
            }
            requestAnimationFrame(loop);
        }

        function res() { calls = []; render(); }
        init();
    </script>
</body>
</html>
