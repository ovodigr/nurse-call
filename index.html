<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Smart v20.0 BrightScan</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #status-area { height: 12vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; }
        #call-display { font-size: 8vw; color: #f44; font-weight: bold; text-align: center; width: 100%; }
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        #settings-scroll { display: none; flex-direction: column; gap: 10px; max-height: 45vh; overflow-y: auto; padding-bottom: 15px; }
        .s-label { display: flex; justify-content: space-between; font-size: 13px; color: #0f0; margin-top: 5px; font-weight: bold; }
        input[type=range] { width: 100%; height: 40px; cursor: pointer; } 
        .log-area { background: #050505; color: #8a8; font-family: monospace; font-size: 10px; padding: 5px; height: 80px; overflow-y: scroll; margin-top: 5px; white-space: pre-wrap; }
        .btn-row { display: flex; gap: 8px; margin-top: 5px; }
        button { border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 2.5; padding: 15px; font-size: 18px; }
        .btn-clear { background: #444; flex: 1.5; }
        .btn-gear { background: #007bff; flex: 0.8; font-size: 20px; }
        .btn-pip { background: #6f42c1; flex: 1.2; font-size: 14px; }
    </style>
</head>
<body>

    <div id="status-area"><div id="call-display">ГОТОВИЙ</div></div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <canvas id="pipCanvas" width="750" height="200" style="display:none;"></canvas>
    <video id="pipVideo" autoplay muted style="display:none;"></video>

    <div class="ui-panel">
        <div id="settings-scroll">
            <div class="s-label"><span>FPS (ЧАСТОТА): <span id="v-fps">1</span></span></div>
            <input type="range" id="fpsRange" min="1" max="30" value="1" oninput="saveUpd()">
            
            <div class="s-label"><span>ПОРІГ ЯСКРАВОСТІ (DELTA): <span id="v-sens">40</span></span></div>
            <input type="range" id="sensRange" min="10" max="100" value="40" oninput="saveUpd()">

            <div class="s-label"><span>РОЗМІР ТОЧОК: <span id="v-size">20</span></span></div>
            <input type="range" id="sizeRange" min="5" max="100" value="20" oninput="saveUpd()">
            
            <div class="s-label"><span>ВІДСТАНЬ: <span id="v-gap">9.0</span></span></div>
            <input type="range" id="gapRange" min="2" max="15" value="9.0" step="0.1" oninput="saveUpd()">
            
            <div id="log-box" class="log-area">Система готова...</div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button style="flex:1; background:#555; padding:8px; border-radius:5px; font-size:11px;" onclick="clearLog()">ОЧИСТИТИ ЛОГ</button>
                <button style="flex:1; background:#007bff; padding:8px; border-radius:5px; font-size:11px;" onclick="copyLog()">КОПІЮВАТИ</button>
            </div>
            
            <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px; margin-top:10px;">
                <script>for(let i=1; i<=10; i++) document.write(`<button style="background:#333; border:1px solid #555; border-radius:6px; padding:10px 0; color:white; font-weight:bold;" onclick="reg(${i}, false)">${i}</button>`);</script>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="tglS()">⚙️</button>
            <button class="btn-pip" onclick="togglePiP()">🖼️ ПОВЕРХ</button>
            <button id="start-btn" class="btn-start" onclick="tglA()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="res()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';
        let act = false, calls = [], logs = [];
        
        let zones = Array.from({length: 10}, (_, i) => ({ 
            id: i + 1, x: 10, y: 50, on: false, baseline: 0, lastVal: 0, 
            detectStart: 0, lastSeenTime: 0 
        }));

        const vid = document.getElementById('video'), disp = document.getElementById('call-display'), lb = document.getElementById('log-box');
        const ov = document.getElementById('overlay'), canv = document.createElement('canvas'), ctx = canv.getContext('2d', { willReadFrequently: true });
        const pCanv = document.getElementById('pipCanvas'), pCtx = pCanv.getContext('2d'), pVid = document.getElementById('pipVideo');

        function addLog(m) {
            logs.push(`[${new Date().toLocaleTimeString('uk-UA',{hour12:false})}] ${m}`);
            if (logs.length > 40) logs.shift();
            lb.innerText = logs.join('\n'); lb.scrollTop = lb.scrollHeight;
        }

        function clearLog() { logs = []; lb.innerText = ""; }
        function copyLog() { navigator.clipboard.writeText(logs.join('\n')).then(() => alert("Лог скопійовано!")); }

        function saveUpd() {
            localStorage.setItem('vP20', JSON.stringify({
                s: document.getElementById('sizeRange').value, 
                g: document.getElementById('gapRange').value, 
                f: document.getElementById('fpsRange').value,
                sn: document.getElementById('sensRange').value
            }));
            upd();
        }

        function reg(id, isCam = true) {
            const now = Date.now();
            const z = zones.find(zn => zn.id === id);

            if (isCam) {
                if (!act) return;
                // Фільтр 20 секунд від ОСТАННЬОГО спрацювання
                if (now - z.lastSeenTime < 20000) {
                    z.lastSeenTime = now; 
                    return; 
                }
            }

            z.lastSeenTime = now;
            addLog(`${isCam ? '📷' : '🔘'} Виклик Палата ${id}`);
            
            let idx = calls.findIndex(x => x.id === id);
            if (idx !== -1) { calls.splice(idx, 1); }
            calls.push({ id, time: now }); // Додаємо в кінець (справа)
            if (calls.length > 5) calls.shift();

            // Чистий список для Telegram
            let tgText = calls.map(x => `${x.id}(${Math.floor((Date.now() - x.time) / 60000)})`).join(", ");
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(tgText)}`);
            
            render();
        }

        function render() {
            const now = Date.now();
            let txt = calls.length === 0 ? (act ? "ГОТОВИЙ" : "ПАУЗА") : 
                calls.map(x => `${x.id}(${Math.floor((now - x.time) / 60000)})`).join(", ");
            
            disp.innerText = txt;
            disp.style.color = calls.length === 0 ? "#0f0" : "#f44";
            
            // Малюємо список у PiP вікно
            pCtx.fillStyle = "black"; pCtx.fillRect(0, 0, pCanv.width, pCanv.height);
            pCtx.fillStyle = calls.length === 0 ? "#00ff00" : "#ff4444";
            pCtx.font = "bold 55px sans-serif"; pCtx.textAlign = "center";
            pCtx.fillText(txt, pCanv.width/2, pCanv.height/2 + 20);
        }

        setInterval(() => { if(calls.length > 0) render(); }, 10000); // Оновлення хвилин кожні 10с

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) { await document.exitPictureInPicture(); } 
                else {
                    const stream = pCanv.captureStream(10);
                    pVid.srcObject = stream;
                    await pVid.play();
                    await pVid.requestPictureInPicture();
                }
            } catch (e) { alert("PiP помилка"); }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { res(); addLog("Скинуто через Esc"); } //
        });

        function upd() {
            const gap = parseFloat(document.getElementById('gapRange').value);
            const size = document.getElementById('sizeRange').value;
            const sens = document.getElementById('sensRange').value;
            document.getElementById('v-size').innerText = size;
            document.getElementById('v-gap').innerText = gap;
            document.getElementById('v-fps').innerText = document.getElementById('fpsRange').value;
            document.getElementById('v-sens').innerText = sens;
            ov.innerHTML = '';
            zones.forEach((z, i) => {
                z.x = 10 + (i * gap);
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", size); c.setAttribute("fill", "rgba(0,255,0,0.2)");
                c.setAttribute("stroke", "white"); ov.appendChild(c);
            });
        }

        function tglS() { const s = document.getElementById('settings-scroll'); s.style.display = (s.style.display === 'none') ? 'flex' : 'none'; }
        
        function tglA() { 
            act = !act; 
            document.getElementById('start-btn').innerText = act ? "🛑 СТОП" : "▶ СТАРТ";
            if (act) { 
                addLog("Калібрування фону...");
                setTimeout(() => { 
                    zones.forEach(z => z.baseline = z.lastVal); 
                    addLog("Калібрування завершено."); 
                }, 1200); 
            } 
            render(); 
        }

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, facingMode: "environment" } });
                vid.srcObject = s;
                const p = JSON.parse(localStorage.getItem('vP20') || '{}');
                if(p.s) document.getElementById('sizeRange').value = p.s;
                if(p.g) document.getElementById('gapRange').value = p.g;
                if(p.f) document.getElementById('fpsRange').value = p.f;
                if(p.sn) document.getElementById('sensRange').value = p.sn;
                upd(); loop();
            } catch (e) { addLog("Режим симуляції (камера не знайдена)"); upd(); loop(); }
        }

        function loop() {
            if (vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.drawImage(vid, 0, 0);
                
                const now = Date.now();
                const sens = parseInt(document.getElementById('sensRange').value);

                zones.forEach((z) => {
                    const x = Math.floor(canv.width * z.x / 100);
                    const y = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    
                    // Аналіз яскравості (Luma) для денного світла
                    const bright = (p[0] * 0.299 + p[1] * 0.587 + p[2] * 0.114);
                    z.lastVal = Math.floor(bright);

                    if (act && bright > (z.baseline + sens)) {
                        if (z.detectStart === 0) z.detectStart = now; 
                        if (now - z.detectStart > 300) { // Стабільність 300мс
                            reg(z.id, true);
                            z.on = true; 
                        }
                    } else {
                        z.detectStart = 0;
                        z.on = false;
                    }
                });
            }
            const fps = parseInt(document.getElementById('fpsRange').value);
            setTimeout(loop, 1000 / fps);
        }

        function res() { 
            calls = []; 
            render(); 
            zones.forEach(z => { z.lastSeenTime = 0; z.on = false; }); 
            addLog("Список скинуто.");
        }
        init();
    </script>
</body>
</html>
