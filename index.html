<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellez Smart Monitor v15.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #status-area { height: 15vh; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 2px solid #333; flex-shrink: 0; padding: 0 10px; }
        #call-display { font-size: 9vw; color: #0f0; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; }
        #cam-box { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui-panel { background: #1a1a1a; padding: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        #settings-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .s-label { display: flex; justify-content: space-between; font-size: 14px; color: #0f0; font-weight: bold; }
        input[type=range] { width: 100%; height: 45px; margin: 0; cursor: pointer; } 
        .test-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        .t-btn { background: #333; border: 1px solid #555; border-radius: 8px; padding: 15px 0; color: white; font-weight: bold; font-size: 18px; touch-action: manipulation; }
        .t-btn:active { background: #007bff; transform: scale(0.95); }
        .btn-row { display: flex; gap: 10px; }
        button { padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #28a745; flex: 3; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; flex: 2; }
        .btn-gear { background: #007bff; flex: 1; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="status-area">
        <div id="call-display">ГОТОВИЙ</div>
    </div>

    <div id="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="ui-panel">
        <div id="settings-group">
            <div>
                <div class="s-label"><span>РОЗМІР ТОЧОК</span><span id="v-size">20</span></div>
                <input type="range" id="sizeRange" min="5" max="120" value="20" oninput="updateUI()">
            </div>
            <div>
                <div class="s-label"><span>ВІДСТАНЬ</span><span id="v-gap">9.0</span></div>
                <input type="range" id="gapRange" min="2" max="18" value="9.0" step="0.1" oninput="updateUI()">
            </div>
            
            <div class="test-grid">
                <button class="t-btn" onclick="registerCall(1)">1</button>
                <button class="t-btn" onclick="registerCall(2)">2</button>
                <button class="t-btn" onclick="registerCall(3)">3</button>
                <button class="t-btn" onclick="registerCall(4)">4</button>
                <button class="t-btn" onclick="registerCall(5)">5</button>
                <button class="t-btn" onclick="registerCall(6)">6</button>
                <button class="t-btn" onclick="registerCall(7)">7</button>
                <button class="t-btn" onclick="registerCall(8)">8</button>
                <button class="t-btn" onclick="registerCall(9)">9</button>
                <button class="t-btn" onclick="registerCall(10)">10</button>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-gear" onclick="toggleSettings()">⚙️</button>
            <button id="start-btn" class="btn-start" onclick="toggleStart()">▶ СТАРТ</button>
            <button class="btn-clear" onclick="resetCalls()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TG_ID = '-5292414189';

        let isRunning = false;
        let callData = []; // Масив об'єктів {id, count}
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, active: false }));

        const vid = document.getElementById('video');
        const disp = document.getElementById('call-display');
        const ov = document.getElementById('overlay');
        const canv = document.createElement('canvas');
        const ctx = canv.getContext('2d', { willReadFrequently: true });

        // Головна функція реєстрації (працює і для кнопок, і для камери)
        function registerCall(id, fromCamera = false) {
            // Якщо з камери, але аналіз вимкнено - ігноруємо
            if (fromCamera && !isRunning) return;

            // Відправка в Telegram
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent('🚨 ВИКЛИК: Палата №' + id)}`)
                .catch(e => console.error("Telegram Error"));

            // Логіка списку: шукаємо, чи є вже ця палата в активних 5
            let index = callData.findIndex(item => item.id === id);
            
            if (index !== -1) {
                // Якщо є - збільшуємо лічильник і переносимо в кінець черги
                callData[index].count++;
                let item = callData.splice(index, 1)[0];
                callData.push(item);
            } else {
                // Якщо немає - додаємо нову в кінець
                callData.push({ id: id, count: 1 });
            }

            // Тримаємо тільки останні 5 унікальних
            if (callData.length > 5) {
                callData.shift();
            }

            renderText();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function renderText() {
            if (callData.length === 0) {
                disp.innerText = isRunning ? "ГОТОВИЙ" : "ПАУЗА";
                disp.style.color = "#0f0";
                return;
            }

            // Формуємо рядок типу 1, 2(2), 5
            const output = callData.map(item => {
                return item.count > 1 ? `${item.id}(${item.count})` : `${item.id}`;
            }).join(", ");

            disp.innerText = output;
            disp.style.color = "#f44";
        }

        function updateUI() {
            const gap = parseFloat(document.getElementById('gapRange').value);
            const size = document.getElementById('sizeRange').value;
            document.getElementById('v-gap').innerText = gap;
            document.getElementById('v-size').innerText = size;
            
            zones.forEach((z, i) => { z.x = 10 + (i * gap); });
            
            ov.innerHTML = '';
            zones.forEach(z => {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", z.x + "%"); c.setAttribute("cy", z.y + "%");
                c.setAttribute("r", size); c.setAttribute("fill", "rgba(0,255,0,0.4)");
                c.setAttribute("stroke", "white");
                ov.appendChild(c);
            });
        }

        function toggleSettings() {
            const gs = document.getElementById('settings-group');
            gs.style.display = (gs.style.display === 'none') ? 'flex' : 'none';
        }

        function toggleStart() {
            isRunning = !isRunning;
            const btn = document.getElementById('start-btn');
            btn.innerText = isRunning ? "🛑 СТОП" : "▶ СТАРТ";
            btn.classList.toggle('btn-stop', isRunning);
            renderText();
        }

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
                vid.srcObject = s;
                updateUI();
                loop();
            } catch (e) { disp.innerText = "КАМЕРА ПІД КЛЮЧЕМ"; }
        }

        function loop() {
            if (isRunning && vid.readyState === 4) {
                canv.width = vid.videoWidth; canv.height = vid.videoHeight;
                ctx.drawImage(vid, 0, 0);
                zones.forEach(z => {
                    const x = Math.floor(canv.width * z.x / 100);
                    const y = Math.floor(canv.height * z.y / 100);
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    const green = p[1] - (p[0] + p[2]) / 2;

                    if (green > 80) {
                        if (!z.active) {
                            registerCall(z.id, true);
                            z.active = true;
                        }
                    } else { z.active = false; }
                });
            }
            requestAnimationFrame(loop);
        }

        function resetCalls() {
            callData = [];
            renderText();
        }

        init();
    </script>
</body>
</html>
