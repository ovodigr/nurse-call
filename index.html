<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Vellez Simple Monitor</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Велике табло */
        #display { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 15vw; color: #0f0; font-weight: bold; }

        /* Відео */
        #video-wrap { position: relative; width: 100%; background: #111; }
        video { width: 100%; height: auto; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Панель налаштувань (ЗАВЖДИ ВИДИМА) */
        .controls { background: #1a1a1a; padding: 15px; border-top: 2px solid #333; }
        .slider-row { margin-bottom: 15px; }
        .slider-row label { display: block; font-size: 14px; margin-bottom: 5px; color: #aaa; }
        input[type=range] { width: 100%; height: 30px; }

        /* Кнопки */
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; color: white; }
        #start-btn { background: #28a745; }
        .btn-stop { background: #dc3545 !important; }
        .btn-clear { background: #444; }
    </style>
</head>
<body>

    <div id="display">ПАУЗА</div>

    <div id="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <svg id="overlay"></svg>
    </div>

    <div class="controls">
        <div class="slider-row">
            <label>РОЗМІР ТОЧОК: <span id="size-v">15</span></label>
            <input type="range" id="sizeRange" min="5" max="60" value="15" oninput="updateLayout()">
        </div>
        <div class="slider-row">
            <label>ВІДСТАНЬ МІЖ НИМИ: <span id="gap-v">8.8</span></label>
            <input type="range" id="gapRange" min="2" max="15" value="8.8" step="0.1" oninput="updateLayout()">
        </div>
        <div class="slider-row" style="display:none;"> <input type="range" id="sensRange" min="30" max="150" value="80">
        </div>

        <div class="btn-row">
            <button id="start-btn" onclick="toggleEngine()">▶️ СТАРТ АНАЛІЗУ</button>
            <button class="btn-clear" onclick="clearCalls()">ОЧИСТИТИ</button>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8727015231:AAG4c-i_fWkX84ChY3NvS0NLnrzBnWXiO7g';
        const TELEGRAM_CHAT_ID = '-5292414189'; // Твій Chat ID групи Mental

        let isRunning = false;
        let callList = [];
        let zones = Array.from({length: 10}, (_, i) => ({ id: i + 1, x: 10, y: 50, lastActive: false }));

        const video = document.getElementById('video');
        const display = document.getElementById('display');
        const overlay = document.getElementById('overlay');
        const procCanvas = document.createElement('canvas');
        const procCtx = procCanvas.getContext('2d');

        function updateLayout() {
            const gap = parseFloat(document.getElementById('gapRange').value);
            const size = document.getElementById('sizeRange').value;
            document.getElementById('gap-v').innerText = gap;
            document.getElementById('size-v').innerText = size;
            
            zones.forEach((zone, i) => {
                zone.x = 10 + (i * gap); 
            });
            drawMarkers(size);
        }

        function drawMarkers(size) {
            overlay.innerHTML = '';
            zones.forEach(zone => {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", zone.x + "%");
                c.setAttribute("cy", zone.y + "%");
                c.setAttribute("r", size);
                c.setAttribute("fill", "rgba(0, 255, 0, 0.4)");
                c.setAttribute("stroke", "white");
                overlay.appendChild(c);
            });
        }

        function toggleEngine() {
            isRunning = !isRunning;
            const btn = document.getElementById('start-btn');
            btn.innerText = isRunning ? "🛑 ЗУПИНИТИ" : "▶️ СТАРТ АНАЛІЗУ";
            btn.classList.toggle('btn-stop', isRunning);
            display.innerText = isRunning ? "ГОТОВИЙ" : "ПАУЗА";
            if(isRunning) callList = [];
        }

        function sendTelegram(id) {
            if (!isRunning) return;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent('🚨 ВИКЛИК: Палата №' + id)}`);
        }

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
            video.srcObject = stream;
            updateLayout();
            requestAnimationFrame(process);
        }

        function process() {
            if (isRunning && video.readyState === video.HAVE_ENOUGH_DATA) {
                procCanvas.width = video.videoWidth;
                procCanvas.height = video.videoHeight;
                procCtx.drawImage(video, 0, 0);

                zones.forEach(zone => {
                    const x = Math.floor(procCanvas.width * zone.x / 100);
                    const y = Math.floor(procCanvas.height * zone.y / 100);
                    const p = procCtx.getImageData(x, y, 1, 1).data;
                    
                    const greenIntensity = p[1] - (p[0] + p[2]) / 2;
                    const active = greenIntensity > 80;

                    if (active && !zone.lastActive) {
                        if (callList[callList.length - 1] !== zone.id) {
                            callList.push(zone.id);
                            sendTelegram(zone.id);
                            updateUI();
                        }
                    }
                    zone.lastActive = active;
                });
            }
            requestAnimationFrame(process);
        }

        function updateUI() {
            const text = [...new Set(callList)].slice(-3).reverse().join(", ");
            display.innerText = text || "ГОТОВИЙ";
            display.style.color = text ? "#f00" : "#0f0";
        }

        function clearCalls() { callList = []; updateUI(); }
        init();
    </script>
</body>
</html>
